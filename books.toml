# Book registry — single source of truth for the index pipeline.
# Add a book: append a [[book]] block (or run `index add <pdf>`).
#
# genre selects a section of mgtindex/rubric.md -- what a reader HUNTS FOR differs
# enormously between a rules manual, a catalogue, a construction manual and a
# bestiary. It is also part of the Stage 2 cache key, so editing one genre's
# section only invalidates the books in that genre.
# One of: rules | catalogue | construction | bestiary

